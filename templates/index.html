<!DOCTYPE html>
<html lang="ja" x-data="{ darkMode: false }" :class="{ 'dark': darkMode }">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Memo App</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        serif: ['Playfair Display', 'serif'],
                    },
                    colors: {
                        stone: {
                            50: '#fafaf9', 900: '#1c1917',
                        }
                    }
                }
            }
        }
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-stone-50 dark:bg-stone-900 text-stone-800 dark:text-stone-100 transition-colors duration-500 font-sans leading-relaxed antialiased">
    <div class="max-w-2xl mx-auto px-8 py-16">
        <header class="flex justify-between items-center mb-16">
            <h1 class="font-serif text-5xl font-bold tracking-tight">Memo</h1>
            <button @click="darkMode = !darkMode" class="p-3 rounded-full bg-stone-200 dark:bg-stone-800 transition">
                <span x-show="!darkMode">🌙</span>
                <span x-show="darkMode">☀️</span>
            </button>
        </header>

        <form action="/add" method="post" class="mb-20 space-y-4">
            <input type="text" name="content" required placeholder="新しいメモ..." class="w-full bg-transparent border-b border-stone-200 dark:border-stone-700 px-0 py-4 outline-none focus:border-indigo-500 transition text-lg">
            <input type="text" name="tags" placeholder="タグ (カンマ区切り)..." class="w-full bg-transparent border-b border-stone-200 dark:border-stone-700 px-0 py-4 outline-none focus:border-indigo-500 transition text-sm">
            <button type="submit" class="text-sm text-stone-500 hover:text-indigo-600 transition">メモを追加</button>
        </form>

        <div class="columns-1 md:columns-2 gap-8 space-y-8" 
             x-data="{ loaded: false }" 
             x-init="setTimeout(() => loaded = true, 300)">
            
            <!-- スケルトンUI -->
            <div x-show="!loaded" class="space-y-8">
                <div class="h-32 bg-stone-200 dark:bg-stone-800 rounded-2xl animate-pulse"></div>
            </div>

            <!-- メモ一覧 -->
            <div x-show="loaded" x-cloak class="space-y-8">
                {% if notes|length == 0 %}
                    <div class="text-center py-20 text-stone-500">
                        <p class="text-4xl mb-4">📭</p>
                        <p>メモはまだありません。</p>
                    </div>
                {% endif %}
                
                {% for note in notes %}
                    <div class="break-inside-avoid group bg-stone-100 dark:bg-stone-800 p-8 rounded-2xl transition-all duration-300"
                         x-transition:enter="transition ease-out duration-500"
                         x-transition:enter-start="opacity-0 scale-95"
                         x-transition:enter-end="opacity-100 scale-100">
                        <p class="text-lg mb-6 leading-relaxed">{{ note.content }}</p>
                        <div class="flex justify-between items-center text-xs text-stone-500 dark:text-stone-400">
                            <div class="flex flex-wrap gap-2">
                                {% for tag in note.tags %}
                                    <span class="px-2 py-0.5 rounded text-stone-600 dark:text-stone-300">{{ tag[0] }}</span>
                                {% endfor %}
                            </div>
                            <div class="flex items-center gap-4">
                                <time>{{ note.created_at }}</time>
                                <a href="/delete/{{ note.id }}" 
                                   class="text-stone-400 hover:text-red-500 transition active:scale-95"
                                   @click.prevent="el = $el.closest('.break-inside-avoid'); el.classList.add('opacity-0', 'scale-90'); setTimeout(() => window.location.href = $el.href, 300)">削除</a>
                            </div>
                        </div>
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>
</body>
</html>
