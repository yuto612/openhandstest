<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Simple Memo App</title>
</head>
<body>
    <h1>メモアプリ</h1>
    <form action="/add" method="post">
        <input type="text" name="content" required>
        <button type="submit">追加</button>
    </form>
    <ul>
        {% for note in notes %}
            <li>
                {{ note[1] }}
                <a href="/delete/{{ note[0] }}">削除</a>
            </li>
        {% endfor %}
    </ul>
</body>
</html>
